name: Build Deb

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install dpkg ldid make 2>/dev/null || true

      - name: Setup Theos
        run: |
          curl -sL https://github.com/theos/theos/archive/master.tar.gz | tar xz -C $HOME
          mv $HOME/theos-master $HOME/theos
          curl -sL https://github.com/theos/sdks/archive/master.tar.gz | tar xz -C /tmp
          mkdir -p $HOME/theos/sdks
          cp -r /tmp/sdks-master/iPhoneOS16.5.sdk $HOME/theos/sdks/
          chmod +x $HOME/theos/bin/dm.pl
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          export THEOS=$HOME/theos
          export PATH=$THEOS/bin:$PATH
          make package FINALPACKAGE=1

      - name: Upload Deb
        uses: actions/upload-artifact@v4
        with:
          name: doubao-autoclose-deb
          path: packages/*.deb
